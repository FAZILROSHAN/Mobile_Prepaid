<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobiCharge - Admin Dashboard</title>
    <!-- CSS Links -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    
    <!-- Scripts -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.0/chart.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar"></div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Tab Navigation -->
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
                <a class="nav-link active" href="#" data-tab="dashboard">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-tab="plans">Plans & Packages</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-tab="analytics">Analytics</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-tab="tickets">Support Tickets</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-tab="settings">Settings</a>
            </li>
        </ul>

        <!-- Content Sections -->
        <div id="dashboardContent" class="tab-content active">
            <h2>Dashboard</h2>
            <p>Welcome to the MobiCharge admin dashboard.</p>
        </div>
        <div id="plansContent" class="tab-content"></div>
        <div id="analyticsContent" class="tab-content">
            <h2>Analytics</h2>
            <canvas id="userGrowthChart"></canvas>
            <canvas id="revenueChart"></canvas>
        </div>
        <div id="ticketsContent" class="tab-content"></div>
        <div id="settingsContent" class="tab-content"></div>
    </div>

    <!-- Scripts -->
    <script defer src="main.js"></script>
    <script defer src="chart.js"></script>
    <script defer src="pdf-export.js"></script>
</body>
</html>
